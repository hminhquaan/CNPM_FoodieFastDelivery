server:
  port: 8080
  servlet:
    context-path: /home

spring:
  datasource:
    url: jdbc:h2:mem:foodfast;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# Reuse same JWT key from default profile if not overridden
# jwt:
#   signerKey: <inherit from application.yaml>
