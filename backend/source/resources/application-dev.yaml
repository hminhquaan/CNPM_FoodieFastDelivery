  password:
    noop: true

vnpay:
  tmn-code: "HCVE5UQF"
  hash-secret: "QQ8FJPL59KYNDMMPJNJOGFJ7FCVNL41J"
  url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  return-url: "http://172.20.10.2:8080/api/v1/payments/vnpay-return"

# Frontend base URL for building links in payment return pages
frontend:
  base-url: "http://172.20.10.2:3000"
  api-url: "https://sandbox.vnpayment.vn/merchant_webapi/api/transaction"
  version: "2.1.0"
  command: "pay"
  order-type: "other"

app:
  seed:
    ensure-categories: false    # keep false; set true only when you want categories auto-created
    populate-demo: false        # keep false so CommandLineRunner won't create demo stores/products
  admin:
    normalize-on-start: false   # keep off; use admin endpoint to normalize to avoid startup issues
  payments:
    allow-simulate: true        # enable /api/v1/payments/simulate-success for local drone testing
  demo:
    enable: true                # enable demo delivery kickoff endpoints for local testing