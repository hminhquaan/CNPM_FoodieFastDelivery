server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    # Chú ý: Dòng url này rất dài, hãy để nó nằm trên 1 dòng duy nhất, đừng tự xuống dòng
    url: jdbc:mysql://localhost:3306/fast_food_delivery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: tinle
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # Đổi từ 'update' sang 'create' để xóa dữ liệu cũ bị lỗi
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      # Disable re-seeding on each startup to avoid duplicate key errors when DB already has data
      mode: always
      data-locations:
        - classpath:data_food_fast.sql
      # Optional: ensure correct encoding for Vietnamese content
      encoding: UTF-8
#  Removed data-locations to prevent seeding on each startup. If you want controlled migrations,
#  introduce Flyway or Liquibase instead of data.sql.
  # NOTE: If you need initial demo data once, run with SPRING_SQL_INIT_MODE=always for one start, then revert.

  flyway:
    enabled: false

# Reuse same JWT key and management settings from application.yaml unless overridden
jwt:
  signerKey: "KrNmhbHWRyKlsC8INjwDulyy+A1XoYm2N6KXJ/knkLQiEnE9QS9s7k02m31arvcPfXqTsENoArNgJbrgdQsPyw=="
  valid-duration: 3600 # Ví dụ: thời gian hết hạn (giây), tùy code của bạn có dùng không
  refreshable-duration: 7200 # Ví dụ

# DEV-ONLY: Use plaintext passwords (NoOp encoder). Do NOT enable in production.
