server:
  port: 8080
  servlet:
    context-path: /home

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fast_food_delivery?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
    username: root
    password: CHANGEME_DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: false

jwt:
  signerKey: "CHANGEME_SUPER_SECRET_JWT_SIGNER_KEY"

vnpay:
  tmn-code: "CHANGEME_TMN_CODE"
  hash-secret: "CHANGEME_VNPAY_SECRET"
  url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  return-url: "http://localhost:8080/home/api/v1/payments/vnpay-return"
  api-url: "https://sandbox.vnpayment.vn/merchant_webapi/api/transaction"
  version: "2.1.0"
  command: "pay"
  order-type: "other"

app:
  commission:
    rate: 0.20
  payment-gateway:
    fee-rate: 0.01

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
